<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="description" content="This is the online markdown editor with live preview.">
    <title>Markdown Live Preview</title>

    <!-- Bootstrap theme early to avoid flash -->
    <script>
      (function () {
        try {
          var THEME_KEY = 'com.markdownlivepreview_theme';
          var raw = localStorage.getItem(THEME_KEY);
          var useDark = (raw === null) ? true : (raw === 'dark'); // default dark
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');

          var href = useDark
            ? 'css/github-markdown-dark_dimmed.css?v=1.13.0'
            : 'css/github-markdown-light.css?v=1.13.0';

          var link = document.createElement('link');
          link.id = 'gh-markdown-link';
          link.rel = 'stylesheet';
          link.type = 'text/css';
          link.href = href;
          document.head.appendChild(link);
        } catch (e) { /* ignore */ }
      })();
    </script>

    <link rel="stylesheet" type="text/css" href="css/style.css?v=1.13.0">

    <!-- CodeMirror editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/continuelist.min.js"></script>

    <!-- Markdown + sanitize -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>

    <!-- Syntax highlighting (highlight.js) — theme link swapped at runtime -->
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Export PNG -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Mermaid diagrams -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>

  <body>
    <header>
      <div id="menu-items">
        <div><a href="/">Markdown Live Preview</a></div>
        <div id="reset-button"><a href="#">Reset</a></div>
        <div id="copy-button"><a href="#">Copy</a></div>
        <div id="png-button"><a href="#">Download PNG</a></div>
        <div id="share-button"><a href="#">Share</a></div>
        <div id="code-theme-select" class="theme-select">
          <label for="code-theme">Code theme</label>
          <select id="code-theme">
            <option value="github-dark">GitHub Dark</option>
            <option value="github">GitHub Light</option>
            <option value="monokai">Monokai</option>
            <option value="dracula">Dracula</option>
            <option value="atom-one-dark">Atom One Dark</option>
            <option value="atom-one-light">Atom One Light</option>
            <option value="nord">Nord</option>
            <option value="solarized-dark">Solarized Dark</option>
            <option value="solarized-light">Solarized Light</option>
            <option value="vs">VS</option>
            <option value="vs2015">VS 2015</option>
          </select>
        </div>
        <div id="mermaid-theme-select" class="theme-select">
          <label for="mermaid-theme">Mermaid theme</label>
          <select id="mermaid-theme">
            <option value="auto">Auto (follow mode)</option>
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="forest">Forest</option>
            <option value="neutral">Neutral</option>
            <option value="base">Base</option>
          </select>
        </div>
        <div id="sync-button">
          <input type="checkbox" id="sync-scroll-checkbox"><label for="sync-scroll-checkbox">Sync scroll</label>
          <span style="margin-left:12px;"><input type="checkbox" id="theme-checkbox"><label for="theme-checkbox">Dark mode</label></span>
        </div>
      </div>
    </header>

    <div id="container" class="split-container">
      <div id="edit" class="column editor-pane">
        <div id="editor-wrapper">
          <div id="editor"></div>
        </div>
      </div>

      <div id="split-divider" class="split-divider"></div>

      <div id="preview" class="column preview-pane">
        <div id="preview-wrapper">
          <div id="output" class="content markdown-body"></div>
        </div>
      </div>
    </div>

    <footer></footer>

    <style>
      /* CodeMirror sizing to fill the editor pane */
      .CodeMirror {
        height: 100%;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 14px;
        line-height: 1.5;
      }
      /* Light (day) theme refinements */
      .CodeMirror { background-color: #ffffff; color: #24292f; }
      .CodeMirror-gutters { background-color: #ffffff; border-right: 1px solid #e1e4e8; }
      .CodeMirror-linenumber { color: #6e7781; }
      .CodeMirror-cursor { border-left-color: #24292f; }
      .CodeMirror-selected { background: #dbe9f9; }
      .CodeMirror-focused .CodeMirror-selected { background: #c8e1ff; }
      .CodeMirror-line::selection,
      .CodeMirror-line > span::selection,
      .CodeMirror-line > span > span::selection { background: #c8e1ff; }
      .CodeMirror-activeline-background { background: #f6f8fa; }
      .CodeMirror-matchingbracket { color: #24292f; background: #d0d7de; }

      /* Dark (night) theme — base */
      [data-theme="dark"] .CodeMirror { background-color: #0d1117; color: #e6edf3; }
      [data-theme="dark"] .CodeMirror-gutters { background-color: #0d1117; border-right: 1px solid #1f2d3a; }
      [data-theme="dark"] .CodeMirror-linenumber { color: #6e7681; }
      [data-theme="dark"] .CodeMirror-cursor { border-left-color: #e6edf3; }
      [data-theme="dark"] .CodeMirror-selected { background: #264f78; }
      [data-theme="dark"] .CodeMirror-focused .CodeMirror-selected { background: #1f6feb; }
      [data-theme="dark"] .CodeMirror-line::selection,
      [data-theme="dark"] .CodeMirror-line > span::selection,
      [data-theme="dark"] .CodeMirror-line > span > span::selection { background: #1f6feb; }
      [data-theme="dark"] .CodeMirror-activeline-background { background: #161b22; }
      [data-theme="dark"] .CodeMirror-matchingbracket { color: #e6edf3; background: #30363d; }

      /* Dark (night) theme — markdown / syntax token overrides */
      [data-theme="dark"] .cm-s-default .cm-keyword { color: #ff7b72; }
      [data-theme="dark"] .cm-s-default .cm-atom { color: #79c0ff; }
      [data-theme="dark"] .cm-s-default .cm-number { color: #79c0ff; }
      [data-theme="dark"] .cm-s-default .cm-def { color: #d2a8ff; }
      [data-theme="dark"] .cm-s-default .cm-variable { color: #e6edf3; }
      [data-theme="dark"] .cm-s-default .cm-variable-2 { color: #79c0ff; }
      [data-theme="dark"] .cm-s-default .cm-variable-3 { color: #56d4dd; }
      [data-theme="dark"] .cm-s-default .cm-property { color: #e6edf3; }
      [data-theme="dark"] .cm-s-default .cm-operator { color: #e6edf3; }
      [data-theme="dark"] .cm-s-default .cm-comment { color: #8b949e; font-style: italic; }
      [data-theme="dark"] .cm-s-default .cm-string { color: #a5d6ff; }
      [data-theme="dark"] .cm-s-default .cm-string-2 { color: #a5d6ff; }
      [data-theme="dark"] .cm-s-default .cm-meta { color: #8b949e; }
      [data-theme="dark"] .cm-s-default .cm-qualifier { color: #8b949e; }
      [data-theme="dark"] .cm-s-default .cm-builtin { color: #d2a8ff; }
      [data-theme="dark"] .cm-s-default .cm-bracket { color: #8b949e; }
      [data-theme="dark"] .cm-s-default .cm-tag { color: #7ee787; }
      [data-theme="dark"] .cm-s-default .cm-attribute { color: #79c0ff; }
      [data-theme="dark"] .cm-s-default .cm-header { color: #58a6ff; font-weight: bold; }
      [data-theme="dark"] .cm-s-default .cm-quote { color: #7ee787; }
      [data-theme="dark"] .cm-s-default .cm-hr { color: #8b949e; }
      [data-theme="dark"] .cm-s-default .cm-link { color: #58a6ff; text-decoration: underline; }
      [data-theme="dark"] .cm-s-default .cm-url { color: #a5d6ff; }
      [data-theme="dark"] .cm-s-default .cm-formatting { color: #8b949e; }
      [data-theme="dark"] .cm-s-default .cm-strong { color: #e6edf3; font-weight: bold; }
      [data-theme="dark"] .cm-s-default .cm-em { color: #e6edf3; font-style: italic; }
      [data-theme="dark"] .cm-s-default .cm-strikethrough { color: #8b949e; text-decoration: line-through; }
      [data-theme="dark"] .cm-s-default .cm-error { color: #ff7b72; }

      #png-button { margin-left: 16px; font-weight: bold; }
      #png-button a { color: #ffd479; }
      #share-button { margin-left: 16px; }
      #share-button a { color: #7ee787; font-weight: bold; }
      #mermaid-theme-select { display: none; }
      .theme-select { margin-left: 16px; user-select: none; }
      .theme-select label { margin-right: 4px; }
      .theme-select select {
        background-color: #555;
        color: #fff;
        border: 1px solid #777;
        border-radius: 3px;
        padding: 1px 4px;
        font-size: 12px;
        vertical-align: middle;
      }
      [data-theme="dark"] .theme-select select { background-color: #2b3038; color: #e6edf3; border-color: #444c56; }
      .theme-select select:focus { outline: none; }
    </style>

    <script>
      (function () {
        'use strict';

        var THEME_KEY = 'com.markdownlivepreview_theme';
        var CONTENT_KEY = 'com.markdownlivepreview_content';
        var SYNC_KEY = 'com.markdownlivepreview_syncscroll';
        var CODE_THEME_KEY = 'com.markdownlivepreview_codetheme';
        var MERMAID_THEME_KEY = 'com.markdownlivepreview_mermaidtheme';

        var DEFAULT_CODE_THEME = 'github-dark';
        var DEFAULT_MERMAID_THEME = 'auto';
        var HLJS_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/';

        var DEFAULT_MARKDOWN = [
          '# Markdown Live Preview',
          '',
          'This is the online markdown editor with **live preview**.',
          '',
          '## Features',
          '',
          '- Live preview as you type',
          '- Synced scrolling between editor and preview',
          '- Light / dark mode (dark by default)',
          '- Syntax highlight themes',
          '- Mermaid diagram themes',
          '- Download preview as PNG',
          '- Share via link (?text=base64)',
          '',
          '## Inline formatting',
          '',
          'You can write *italic*, **bold**, `inline code`, ~~strikethrough~~, and [links](https://example.com).',
          '',
          '## Code block',
          '',
          '```js',
          'function hello(name) {',
          '  return `Hello, ${name}!`;',
          '}',
          '```',
          '',
          '## Mermaid diagram',
          '',
          '```mermaid',
          'graph TD',
          '    A[Start] --> B{Logged in?}',
          '    B -->|Yes| C[Dashboard]',
          '    B -->|No| D[Login]',
          '    D --> C',
          '```',
          '',
          '## Table',
          '',
          '| Name | Role |',
          '| ---- | ---- |',
          '| Ada  | Engineer |',
          '| Linus| Maintainer |',
          '',
          '> Blockquote: Markdown is fun.',
          '',
          '1. First item',
          '2. Second item',
          '3. Third item'
        ].join('\n');

        var editor = null;
        var output = document.getElementById('output');
        var preview = document.getElementById('preview');
        var syncScrollCheckbox = document.getElementById('sync-scroll-checkbox');
        var themeCheckbox = document.getElementById('theme-checkbox');
        var ghLink = document.getElementById('gh-markdown-link');

        function getMarkdown() {
          // Shared link ?text=<url-safe base64> takes priority.
          try {
            var p = new URLSearchParams(location.search).get('text');
            if (p) return base64UrlToUtf8(p);
          } catch (e) { /* ignore */ }
          try {
            return localStorage.getItem(CONTENT_KEY) || DEFAULT_MARKDOWN;
          } catch (e) {
            return DEFAULT_MARKDOWN;
          }
        }

        // UTF-8 <-> URL-safe base64 (so the value sits cleanly in a query string).
        function utf8ToBase64Url(str) {
          var bytes = new TextEncoder().encode(str);
          var bin = '';
          for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
          return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
        function base64UrlToUtf8(s) {
          s = s.replace(/-/g, '+').replace(/_/g, '/');
          var pad = s.length % 4;
          if (pad) s += '===='.slice(0, 4 - pad);
          var bin = atob(s);
          var bytes = new Uint8Array(bin.length);
          for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          return new TextDecoder().decode(bytes);
        }

        function render(md) {
          var html = window.marked.parse(md, { breaks: true, gfm: true });
          // marked emits ```mermaid blocks as <pre><code class="language-mermaid">…</code></pre>.
          // Convert each to a <div class="mermaid"> so mermaid can render it.
          html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
            function (m, code) {
              // unescape HTML entities produced by marked
              var txt = decodeEntities(code);
              return '<div class="mermaid">' + escapeHtml(txt) + '</div>';
            });
          var clean = window.DOMPurify.sanitize(html, { ADD_TAGS: ['foreignObject'], ADD_ATTR: ['dominant-baseline', 'text-anchor', 'viewbox', 'preserveaspectratio', 'xmlns:xlink'] });
          output.innerHTML = clean;
          highlightCode();
          renderMermaid();
        }

        function getMermaidThemePref() {
          try {
            return localStorage.getItem(MERMAID_THEME_KEY) || DEFAULT_MERMAID_THEME;
          } catch (e) { return DEFAULT_MERMAID_THEME; }
        }

        // Resolve to a concrete mermaid theme. "auto" follows the day/night mode
        // so diagram text stays readable in both themes.
        function resolveMermaidTheme() {
          var pref = getMermaidThemePref();
          if (pref === 'auto') {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
          }
          return pref;
        }

        function getCodeTheme() {
          try {
            return localStorage.getItem(CODE_THEME_KEY) || DEFAULT_CODE_THEME;
          } catch (e) { return DEFAULT_CODE_THEME; }
        }

        // Apply highlight.js to all fenced code blocks in the preview.
        function highlightCode() {
          if (!window.hljs) return;
          var blocks = output.querySelectorAll('pre code');
          blocks.forEach(function (block) {
            // skip mermaid containers (already handled) and already-highlighted
            if (block.className.indexOf('hljs') !== -1) return;
            try { window.hljs.highlightElement(block); } catch (e) { /* ignore */ }
          });
        }

        function applyCodeTheme(theme) {
          var link = document.getElementById('hljs-theme');
          if (link) link.href = HLJS_BASE + theme + '.min.css';
          try { localStorage.setItem(CODE_THEME_KEY, theme); } catch (e) {}
        }

        function escapeHtml(s) {
          return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function decodeEntities(s) {
          var t = document.createElement('textarea');
          t.innerHTML = s;
          return t.value;
        }

        function renderMermaid() {
          if (!window.mermaid) return;
          if (!window.mermaid.__initialized) {
            window.mermaid.initialize({
              startOnLoad: false,
              theme: resolveMermaidTheme(),
              securityLevel: 'loose',
              fontFamily: 'Helvetica, arial, freesans, clean, sans-serif'
            });
            window.mermaid.__initialized = true;
          }
          var nodes = output.querySelectorAll('.mermaid:not([data-processed])');
          if (nodes.length === 0) return;
          // Keep the raw source so we can re-render on theme change.
          nodes.forEach(function (n) {
            if (!n.getAttribute('data-mermaid-src')) {
              n.setAttribute('data-mermaid-src', n.textContent);
            }
          });
          window.mermaid.run({ nodes: Array.prototype.slice.call(nodes) })
            .then(function () {
              nodes.forEach(function (n) { n.setAttribute('data-processed', 'true'); });
            })
            .catch(function (err) {
              nodes.forEach(function (n) {
                if (!n.querySelector('svg')) {
                  n.classList.add('mermaid-error');
                  n.textContent = (err && err.str) ? err.str : String(err);
                }
              });
            });
        }

        // Re-render all mermaid diagrams (used after a theme/mermaid-theme switch).
        function rerenderMermaid() {
          if (!window.mermaid) return;
          window.mermaid.initialize({
            startOnLoad: false,
            theme: resolveMermaidTheme(),
            securityLevel: 'loose',
            fontFamily: 'Helvetica, arial, freesans, clean, sans-serif'
          });
          var nodes = output.querySelectorAll('.mermaid');
          nodes.forEach(function (n) {
            var src = n.getAttribute('data-mermaid-src') || n.textContent;
            n.classList.remove('mermaid-error');
            n.removeAttribute('data-processed');
            n.textContent = src;
            n.setAttribute('data-mermaid-src', src);
          });
          if (nodes.length === 0) return;
          window.mermaid.run({ nodes: Array.prototype.slice.call(nodes) })
            .then(function () {
              nodes.forEach(function (n) { n.setAttribute('data-processed', 'true'); });
            })
            .catch(function (err) {
              nodes.forEach(function (n) {
                if (!n.querySelector('svg')) {
                  n.classList.add('mermaid-error');
                  n.textContent = (err && err.str) ? err.str : String(err);
                }
              });
            });
        }

        function setTheme(useDark) {
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');
          if (ghLink) {
            ghLink.href = useDark
              ? 'css/github-markdown-dark_dimmed.css?v=1.13.0'
              : 'css/github-markdown-light.css?v=1.13.0';
          }
          themeCheckbox.checked = useDark;
          try { localStorage.setItem(THEME_KEY, useDark ? 'dark' : 'light'); } catch (e) {}
          // Re-render diagrams so they pick up the new mermaid theme.
          if (window.mermaid) rerenderMermaid();
        }

        // --- Editor ---
        function initEditor() {
          editor = window.CodeMirror(document.getElementById('editor'), {
            value: getMarkdown(),
            mode: 'markdown',
            lineNumbers: true,
            lineWrapping: true,
            autofocus: true,
            extraKeys: {
              'Enter': 'newlineAndIndentContinueMarkdownList',
              'Tab': function (cm) { cm.replaceSelection('  ', 'end'); }
            }
          });

          editor.on('change', function (cm) {
            var value = cm.getValue();
            render(value);
            try { localStorage.setItem(CONTENT_KEY, value); } catch (e) {}
          });

          // Initial render
          render(editor.getValue());
        }

        // --- Buttons ---
        function initButtons() {
          var resetBtn = document.getElementById('reset-button');
          var copyBtn = document.getElementById('copy-button');
          var pngBtn = document.getElementById('png-button');
          var shareBtn = document.getElementById('share-button');

          resetBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (window.confirm('Reset the editor to the default content?')) {
              editor.setValue(DEFAULT_MARKDOWN);
              try { localStorage.setItem(CONTENT_KEY, DEFAULT_MARKDOWN); } catch (err) {}
            }
          });

          copyBtn.addEventListener('click', function (e) {
            e.preventDefault();
            var value = editor.getValue();
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(value).then(function () {
                flash(copyBtn, 'Copied!');
              }).catch(function () { fallbackCopy(value); });
            } else {
              fallbackCopy(value);
            }
          });

          function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); flash(copyBtn, 'Copied!'); } catch (err) {}
            document.body.removeChild(ta);
          }

          pngBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (!window.html2canvas) { alert('PNG library still loading, try again in a moment.'); return; }
            flash(pngBtn, 'Rendering...');
            var dark = document.documentElement.getAttribute('data-theme') === 'dark';
            window.html2canvas(output, {
              scale: 2,
              backgroundColor: dark ? '#212830' : '#ffffff',
              useCORS: true
            }).then(function (canvas) {
              canvas.toBlob(function (blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'markdown-preview.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                flash(pngBtn, 'Downloaded PNG');
              }, 'image/png');
            }).catch(function (err) {
              alert('PNG export failed: ' + err.message);
            });
          });

          shareBtn.addEventListener('click', function (e) {
            e.preventDefault();
            var value = editor.getValue();
            var b64 = utf8ToBase64Url(value);
            var base = location.href.split('?')[0];
            var url = base + '?text=' + b64;
            function done() { flash(shareBtn, 'Link copied!'); }
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(url).then(done).catch(function () { fallbackShare(url); });
            } else {
              fallbackShare(url);
            }
          });

          function fallbackShare(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); flash(shareBtn, 'Link copied!'); } catch (err) {}
            document.body.removeChild(ta);
          }

          function flash(btn, msg) {
            var link = btn.querySelector('a');
            if (!link) return;
            var orig = link.textContent;
            link.textContent = msg;
            setTimeout(function () { link.textContent = orig; }, 1200);
          }
        }

        // --- Sync scroll ---
        function initSyncScroll() {
          var syncing = false;

          function ratioScroll(source, target) {
            if (!syncScrollCheckbox.checked || syncing) return;
            var sMax = source.scrollHeight - source.clientHeight;
            var tMax = target.scrollHeight - target.clientHeight;
            if (sMax <= 0 || tMax <= 0) return;
            syncing = true;
            target.scrollTop = (source.scrollTop / sMax) * tMax;
            syncing = false;
          }

          // Editor scroll container
          var editorScroll = editor.getScrollInfo ? null : null;
          // CodeMirror exposes a scroller element
          var cmScroller = editor.getScrollerElement();

          cmScroller.addEventListener('scroll', function () {
            ratioScroll(cmScroller, preview);
          });
          preview.addEventListener('scroll', function () {
            ratioScroll(preview, cmScroller);
          });

          var savedSync;
          try { savedSync = localStorage.getItem(SYNC_KEY); } catch (e) {}
          if (savedSync === 'on') {
            syncScrollCheckbox.checked = true;
            try { localStorage.setItem(SYNC_KEY, 'on'); } catch (e2) {}
          }
          syncScrollCheckbox.addEventListener('change', function () {
            try { localStorage.setItem(SYNC_KEY, syncScrollCheckbox.checked ? 'on' : 'off'); } catch (e) {}
          });
        }

        // --- Theme toggle ---
        function initThemeToggle() {
          var useDark = document.documentElement.getAttribute('data-theme') === 'dark';
          themeCheckbox.checked = useDark;
          themeCheckbox.addEventListener('change', function () {
            setTheme(themeCheckbox.checked);
          });
        }

        // --- Code + Mermaid theme selectors ---
        function initThemeSelectors() {
          var codeSel = document.getElementById('code-theme');
          var mermaidSel = document.getElementById('mermaid-theme');

          // Restore saved selections.
          codeSel.value = getCodeTheme();
          mermaidSel.value = getMermaidThemePref();
          applyCodeTheme(codeSel.value);

          codeSel.addEventListener('change', function () {
            applyCodeTheme(codeSel.value);
            // Re-highlight already-rendered code so the new palette applies cleanly.
            if (window.hljs) {
              output.querySelectorAll('pre code').forEach(function (b) {
                b.removeAttribute('data-highlighted');
                b.className = b.className.replace(/\bhljs\b/g, '').trim();
                try { window.hljs.highlightElement(b); } catch (e) {}
              });
            }
          });

          mermaidSel.addEventListener('change', function () {
            try { localStorage.setItem(MERMAID_THEME_KEY, mermaidSel.value); } catch (e) {}
            if (window.mermaid) {
              window.mermaid.__initialized = false; // force re-initialize with new theme
              rerenderMermaid();
            }
          });
        }

        // --- Split divider drag ---
        function initSplit() {
          var container = document.getElementById('container');
          var edit = document.getElementById('edit');
          var previewEl = document.getElementById('preview');
          var divider = document.getElementById('split-divider');
          var dragging = false;

          divider.addEventListener('mouseenter', function () { divider.classList.add('hover'); });
          divider.addEventListener('mouseleave', function () { divider.classList.remove('hover'); });

          divider.addEventListener('mousedown', function (e) {
            dragging = true;
            divider.classList.add('active');
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
          });

          document.addEventListener('mousemove', function (e) {
            if (!dragging) return;
            var rect = container.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var pct = Math.max(10, Math.min(90, (x / rect.width) * 100));
            edit.style.width = pct + '%';
            previewEl.style.width = (100 - pct) + '%';
            if (editor) editor.refresh();
          });

          document.addEventListener('mouseup', function () {
            if (dragging) {
              dragging = false;
              divider.classList.remove('active');
              document.body.style.cursor = '';
            }
          });
        }

        // --- Init ---
        function init() {
          window.marked.setOptions({ breaks: true, gfm: true });
          initEditor();
          initButtons();
          initSyncScroll();
          initThemeToggle();
          initThemeSelectors();
          initSplit();
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>
  </body>
</html>
